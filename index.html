<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 실시간 공유 캠핑 플래너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'snowpeak-camping-checklist-v1';

        let user = null;
        let checklistState = {};
        let chartInstance = null;
        let totalItemsCount = 0;

        // 최적화된 인증 함수: 대기 시간을 최소화하기 위해 즉시 실행
        const initAuth = async () => {
            try {
                // 로컬 영속성 설정 (재접속 시 인증 속도 향상)
                await setPersistence(auth, browserLocalPersistence);
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                const userIdDisplay = document.getElementById('user-id');
                if (userIdDisplay) userIdDisplay.innerText = "오프라인 모드 작동 중";
            }
        };

        // 인증 상태 리스너: UI 업데이트를 분리하여 인증 지연 시에도 화면이 깨지지 않게 함
        onAuthStateChanged(auth, (u) => {
            user = u;
            const userIdDisplay = document.getElementById('user-id');
            const statusBadge = document.getElementById('status-badge');
            
            if (user) {
                if (userIdDisplay) userIdDisplay.innerText = `ID: ${user.uid}`;
                if (statusBadge) {
                    statusBadge.innerText = "실시간 연결됨";
                    statusBadge.className = "bg-emerald-500 text-white text-[10px] px-2 py-1 rounded shadow-sm font-bold";
                }
                startSync();
            }
        });

        const checklistData = [
            {
                categoryId: "coffee",
                categoryName: "☕ 커피 & 티타임 (바리스타 세트)",
                items: [
                    { id: "c1", label: "볶은 원두 (홀빈 50~100g)" },
                    { id: "c2", label: "종이 필터 (바리스타 드리퍼용)" }
                ]
            },
            {
                categoryId: "adult-food",
                categoryName: "🥩 어른용 식사",
                items: [
                    { id: "af1", label: "구이용 고기 (목살 추천)" },
                    { id: "af2", label: "구이용 야채 (쌈, 버섯, 마늘)" },
                    { id: "af3", label: "양념류 (허브솔트, 쌈장, 참기름)" },
                    { id: "af4", label: "국물 요리 (밀키트 된장/부대찌개)" },
                    { id: "af5_1", label: "햇반 (2~3개)" },
                    { id: "af5_2", label: "컵라면 (개별 준비)" },
                    { id: "af6", label: "음료 (생수, 맥주, 와인)" }
                ]
            },
            {
                categoryId: "baby-food",
                categoryName: "🍼 아기용 식사 (16개월)",
                items: [
                    { id: "bf1", label: "완료기 이유식/유아식 (넉넉히)" },
                    { id: "bf2", label: "구이용 간식 (아기 소시지, 고구마)" },
                    { id: "bf3", label: "간식 (퓨레, 떡뻥, 과일)" },
                    { id: "bf4", label: "식기류 (실리콘 식기, 빨대컵)" },
                    { id: "bf5", label: "위생 (일회용 턱받이, 주방세제)" }
                ]
            },
            {
                categoryId: "baby-care",
                categoryName: "👶 육아용품 (의·식·주)",
                items: [
                    { id: "bc1", label: "기저귀 (1.5배) & 차단 봉투" },
                    { id: "bc2", label: "물티슈 (새거 1팩) & 건티슈" },
                    { id: "bc3", label: "비판텐 (발진 크림)" },
                    { id: "bc4", label: "상하복 세트 (여벌 2~3벌)" },
                    { id: "bc5", label: "수면 조끼 & 가디건" },
                    { id: "bc8", label: "상비약 (해열제, 체온계, 연고)" },
                    { id: "bc9", label: "놀거리 (비눗방울, 모래놀이)" }
                ]
            },
            {
                categoryId: "convenience",
                categoryName: "🧺 캠핑 편의 용품",
                items: [
                    { id: "p1", label: "방수 돗자리 (파쇄석용)" },
                    { id: "p2", label: "이소가스 1개 추가 (커피용)" },
                    { id: "p3", label: "일회용품 (종이컵, 젓가락)" },
                    { id: "p4", label: "개별 조명 (야간 이동용)" }
                ]
            }
        ];

        const getDocRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'packing', 'status');

        function startSync() {
            if (!user) return;
            onSnapshot(getDocRef(), (docSnap) => {
                if (docSnap.exists()) {
                    checklistState = docSnap.data();
                }
                updateUIFromState();
            }, (error) => {
                console.error("Sync Error:", error);
            });
        }

        window.toggleItem = async (itemId) => {
            // 낙관적 UI: 서버 응답 전 UI를 먼저 바꿈
            checklistState[itemId] = !checklistState[itemId];
            updateUIFromState();

            if (!user) return; // 인증 안된 경우 저장만 안함
            try {
                await setDoc(getDocRef(), checklistState, { merge: true });
            } catch (err) { 
                console.error("Save Error:", err);
                // 실패 시 롤백 (선택 사항)
            }
        };

        function renderChecklistUI() {
            const container = document.getElementById('checklist-container');
            if (!container) return;
            container.innerHTML = '';
            totalItemsCount = 0;
            checklistData.forEach(category => {
                const section = document.createElement('div');
                section.className = "mb-6 bg-white border border-stone-200 rounded-2xl overflow-hidden shadow-sm";
                let itemsHtml = '';
                category.items.forEach(item => {
                    totalItemsCount++;
                    itemsHtml += `
                        <div onclick="toggleItem('${item.id}')" class="flex items-center p-4 hover:bg-stone-50 transition cursor-pointer border-b border-stone-50 last:border-0 group text-left">
                            <div class="relative flex items-center justify-center">
                                <input type="checkbox" id="check-${item.id}" class="peer w-6 h-6 rounded-lg border-2 border-stone-300 text-emerald-600 focus:ring-emerald-500 cursor-pointer appearance-none checked:bg-emerald-600 checked:border-emerald-600 transition-all">
                                <svg class="absolute w-4 h-4 text-white hidden peer-checked:block pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                                </svg>
                            </div>
                            <label class="ml-4 text-stone-700 font-medium cursor-pointer flex-1 group-hover:text-emerald-700 transition-colors text-sm" id="label-${item.id}">
                                ${item.label}
                            </label>
                        </div>
                    `;
                });
                section.innerHTML = `
                    <div class="bg-stone-50 px-5 py-3 border-b border-stone-200 text-left">
                        <h3 class="font-bold text-stone-800 text-[10px] uppercase tracking-wider">${category.categoryName}</h3>
                    </div>
                    <div class="divide-y divide-stone-50">${itemsHtml}</div>
                `;
                container.appendChild(section);
            });
            updateUIFromState();
        }

        function updateUIFromState() {
            let completedCount = 0;
            checklistData.forEach(category => {
                category.items.forEach(item => {
                    const isChecked = !!checklistState[item.id];
                    const input = document.getElementById(`check-${item.id}`);
                    const label = document.getElementById(`label-${item.id}`);
                    if (input && label) {
                        input.checked = isChecked;
                        if (isChecked) {
                            label.classList.add('line-through', 'text-stone-300');
                            completedCount++;
                        } else {
                            label.classList.remove('line-through', 'text-stone-300');
                        }
                    }
                });
            });
            updateChart(completedCount);
        }

        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['완료', '미완료'],
                    datasets: [{ data: [0, 100], backgroundColor: ['#10b981', '#f3f4f6'], borderWidth: 0 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '82%',
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        function updateChart(completed) {
            if (!chartInstance) return;
            chartInstance.data.datasets[0].data = [completed, Math.max(0, totalItemsCount - completed)];
            chartInstance.update();
            const percent = totalItemsCount === 0 ? 0 : Math.round((completed / totalItemsCount) * 100);
            document.getElementById('percent-text').innerText = `${percent}%`;
            document.getElementById('count-text').innerText = `${completed} / ${totalItemsCount}`;
        }

        window.onload = () => {
            renderChecklistUI(); // UI 먼저 렌더링
            initChart();
            initAuth(); // 인증은 백그라운드에서 진행
        };
    </script>
    <style>
        .chart-container { position: relative; width: 100%; height: 160px; }
        input[type="checkbox"]:checked {
            background-color: #10b981 !important;
            border-color: #10b981 !important;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans antialiased min-h-screen pb-10">

<div class="max-w-xl mx-auto p-4 md:p-6">
    <header class="text-center mb-8 pt-4">
        <div class="inline-block bg-emerald-50 text-emerald-600 text-[10px] font-bold px-3 py-1 rounded-full mb-3 uppercase tracking-widest">Snow Peak Campaign</div>
        <h1 class="text-2xl font-black text-stone-900 mb-2 tracking-tight">🏔️ 우리 가족 캠핑 플래너</h1>
        <div id="user-id" class="inline-block bg-white border border-stone-200 text-stone-400 text-[9px] px-3 py-1 rounded-full shadow-sm tracking-tighter uppercase font-bold overflow-hidden max-w-[200px] text-ellipsis whitespace-nowrap">연결 중...</div>
    </header>

    <section class="bg-white p-6 rounded-[2rem] shadow-xl shadow-stone-200/50 border border-stone-100 mb-8 relative overflow-hidden">
        <div class="flex items-center gap-6">
            <div class="chart-container flex-shrink-0 w-32 h-32">
                <canvas id="progressChart"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pt-1">
                    <span id="percent-text" class="text-3xl font-black text-stone-900 leading-none">0%</span>
                    <span id="count-text" class="text-[10px] text-stone-400 font-bold mt-1 uppercase">0 / 0</span>
                </div>
            </div>
            <div class="flex-1 text-left">
                <div class="flex items-center gap-2 mb-3">
                    <span id="status-badge" class="bg-stone-100 text-stone-400 text-[10px] px-2 py-1 rounded shadow-sm font-bold">인증 대기</span>
                    <span class="text-stone-400 text-[10px] font-bold uppercase tracking-widest">Cloud Sync</span>
                </div>
                <h2 class="text-xl font-black mb-1 text-stone-800 leading-tight tracking-tight">패킹 진행도</h2>
                <p class="text-stone-400 text-xs italic">준비를 마치고 체크해보세요!</p>
            </div>
        </div>
    </section>

    <div id="checklist-container" class="space-y-4">
        <!-- 스켈레톤 UI 역할을 하는 초기 로딩 메시지 -->
        <div class="p-10 text-center text-stone-400 text-sm font-medium">플래너를 불러오는 중입니다...</div>
    </div>

    <div class="mt-10 bg-stone-900 text-stone-400 p-8 rounded-[2rem] shadow-2xl relative overflow-hidden text-left">
        <div class="absolute top-0 right-0 p-6 opacity-5">
            <svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h14v-8h3L12 3zm0 4.5c1.4 0 2.5 1.1 2.5 2.5S13.4 12.5 12 12.5 9.5 11.4 9.5 10 10.6 7.5 12 7.5z"/></svg>
        </div>
        
        <h3 class="font-black text-white mb-6 flex items-center text-lg">
            <span class="bg-emerald-500 w-2 h-6 rounded-full mr-3"></span>
            캠프필드 상세 이용 정보
        </h3>

        <div class="space-y-4 relative z-10 text-xs font-medium">
            <div class="flex justify-between items-center border-b border-stone-800 pb-3">
                <span class="text-stone-500 font-bold uppercase tracking-tighter">캠핑 기간</span>
                <span class="text-white italic">2026. 04. 25 (토) - 26 (일)</span>
            </div>
            <div class="flex justify-between items-center border-b border-stone-800 pb-3">
                <span class="text-stone-500 font-bold uppercase tracking-tighter">시즌 침구 구성</span>
                <span class="text-emerald-400 font-bold">동계 침구 (4월 말까지)</span>
            </div>
            <div class="flex justify-between items-center border-b border-stone-800 pb-3">
                <span class="text-stone-500 font-bold uppercase tracking-tighter">차량 진입</span>
                <span class="text-white">진입 불가 (카트 이동)</span>
            </div>
            <div class="flex justify-between items-center border-b border-stone-800 pb-3">
                <span class="text-stone-500 font-bold uppercase tracking-tighter">텐트 정보</span>
                <span class="text-white">랜드록 (거실형 대형)</span>
            </div>
            <div class="flex justify-between items-start border-b border-stone-800 pb-3">
                <span class="text-stone-500 font-bold uppercase tracking-tighter">기본 제공</span>
                <div class="text-right text-white">
                    장작 1박스, 가스 1개,<br>IGT 주방, 화로 세트
                </div>
            </div>
            
            <div class="bg-stone-800/50 p-4 rounded-2xl mt-4 border border-emerald-900/30">
                <p class="text-emerald-400 leading-relaxed font-bold">
                    💡 밤에는 매우 춥습니다. 아기 수면조끼를 꼭 챙기세요!
                </p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
