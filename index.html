<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 실시간 공유 캠핑 플래너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMOPnzLxDdoObZat8WLJaB_JqYff64YNU",
            authDomain: "snowpeak-camping-checklist.firebaseapp.com",
            projectId: "snowpeak-camping-checklist",
            storageBucket: "snowpeak-camping-checklist.firebasestorage.app",
            messagingSenderId: "156213939008",
            appId: "1:156213939008:web:17ab93e60f3c412f89c8a5"
        };

        let app, auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'snowpeak-camping-checklist-v1';

        async function init() {
            const statusBadge = document.getElementById('status-badge');
            const userIdDisplay = document.getElementById('user-id');

            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const userCredential = await signInAnonymously(auth);
                const user = userCredential.user;
                
                userIdDisplay.innerText = `접속 ID: ${user.uid.substring(0, 8)}`;
                statusBadge.innerText = "실시간 동기화 중";
                statusBadge.className = "bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded shadow-sm font-bold";
                
                startSync();
                renderChecklistUI();
                initChart();

            } catch (error) {
                console.error("초기화 에러:", error);
                userIdDisplay.innerText = "연결 실패";
                statusBadge.innerText = "연결 오류";
                statusBadge.className = "bg-red-100 text-red-700 text-xs px-2 py-1 rounded shadow-sm font-bold";
                renderChecklistUI();
                initChart();
            }
        }

        let checklistState = {};
        let chartInstance = null;
        let totalItemsCount = 0;

        // 요청하신 라면 및 아침 식사 항목 추가됨
        const checklistData = [
            {
                categoryId: "essential-food",
                categoryName: "개별 준비 식재료 🥩",
                items: [
                    { id: "f1", label: "구이용 고기 (소고기/돼지고기)" },
                    { id: "f2", label: "쌈야채 & 구이용 채소 (버섯, 양파 등)" },
                    { id: "f3", label: "양념류 (소금, 후추, 쌈장, 기름장 등)" },
                    { id: "f4", label: "쌀 또는 햇반 (넉넉히)" },
                    { id: "f5", label: "아침용 라면 & 컵라면" },
                    { id: "f6", label: "곁들임 김치 & 밑반찬" },
                    { id: "f7", label: "생수 & 음료 & 주류" },
                    { id: "f8", label: "커피 믹스 / 드립백" },
                    { id: "f9", label: "간식 (마시멜로, 과자, 과일)" }
                ]
            },
            {
                categoryId: "baby-16m",
                categoryName: "아기용품 (16개월 필수!) 👶",
                items: [
                    { id: "b1", label: "이유식/유아식 (끼니별 포장)" },
                    { id: "b2", label: "아기 전용 수저/포크/식기" },
                    { id: "b3", label: "기저귀 넉넉히 & 휴대용 변기/물티슈" },
                    { id: "b4", label: "아기 세정제 & 목욕 용품" },
                    { id: "b5", label: "수면조끼 & 두툼한 밤 겉옷" },
                    { id: "b6", label: "아기 상비약 (해열제, 체온계, 패치)" }
                ]
            },
            {
                categoryId: "personal-gear",
                categoryName: "개인 위생 & 편의 🧺",
                items: [
                    { id: "p1", label: "개인 세면도구 (칫솔, 치약, 클렌징)" },
                    { id: "p2", label: "수건 (인원별 넉넉히)" },
                    { id: "p3", label: "개인 베개 (아기용 포함 필수!)" },
                    { id: "p4", label: "멀티탭 (전기장판/충전기 연결)" },
                    { id: "p5", label: "여벌 옷 & 양말 (산속 추위 대비)" }
                ]
            }
        ];

        const getDocRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'packing', 'status');

        function startSync() {
            onSnapshot(getDocRef(), (docSnap) => {
                if (docSnap.exists()) {
                    checklistState = docSnap.data();
                }
                updateUIFromState();
            });
        }

        window.toggleItem = async (itemId) => {
            checklistState[itemId] = !checklistState[itemId];
            updateUIFromState();
            if (auth && auth.currentUser) {
                try {
                    await setDoc(getDocRef(), checklistState, { merge: true });
                } catch (err) { console.error("저장 실패:", err); }
            }
        };

        function renderChecklistUI() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';
            totalItemsCount = 0;
            checklistData.forEach(category => {
                const section = document.createElement('div');
                section.className = "mb-6 bg-white border border-stone-200 rounded-2xl overflow-hidden shadow-sm";
                let itemsHtml = '';
                category.items.forEach(item => {
                    totalItemsCount++;
                    itemsHtml += `
                        <div onclick="toggleItem('${item.id}')" class="flex items-center p-4 hover:bg-stone-50 transition cursor-pointer border-b border-stone-50 last:border-0 group">
                            <div class="relative flex items-center justify-center">
                                <input type="checkbox" id="check-${item.id}" class="peer w-6 h-6 rounded-lg border-2 border-stone-300 text-emerald-600 focus:ring-emerald-500 cursor-pointer appearance-none checked:bg-emerald-600 checked:border-emerald-600 transition-all">
                                <svg class="absolute w-4 h-4 text-white hidden peer-checked:block pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                                </svg>
                            </div>
                            <label class="ml-4 text-stone-700 font-medium cursor-pointer flex-1 group-hover:text-emerald-700 transition-colors" id="label-${item.id}">
                                ${item.label}
                            </label>
                        </div>
                    `;
                });
                section.innerHTML = `
                    <div class="bg-stone-50 px-5 py-3 border-b border-stone-200">
                        <h3 class="font-bold text-stone-800 text-sm">${category.categoryName}</h3>
                    </div>
                    <div class="divide-y divide-stone-50">${itemsHtml}</div>
                `;
                container.appendChild(section);
            });
            updateUIFromState();
        }

        function updateUIFromState() {
            let completedCount = 0;
            checklistData.forEach(category => {
                category.items.forEach(item => {
                    const isChecked = !!checklistState[item.id];
                    const input = document.getElementById(`check-${item.id}`);
                    const label = document.getElementById(`label-${item.id}`);
                    if (input && label) {
                        input.checked = isChecked;
                        if (isChecked) {
                            label.classList.add('line-through', 'text-stone-400');
                            completedCount++;
                        } else {
                            label.classList.remove('line-through', 'text-stone-400');
                        }
                    }
                });
            });
            updateChart(completedCount);
        }

        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['완료', '미완료'],
                    datasets: [{ data: [0, 100], backgroundColor: ['#10b981', '#f3f4f6'], borderWidth: 0 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '82%',
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        function updateChart(completed) {
            if (!chartInstance) return;
            chartInstance.data.datasets[0].data = [completed, Math.max(0, totalItemsCount - completed)];
            chartInstance.update();
            const percent = totalItemsCount === 0 ? 0 : Math.round((completed / totalItemsCount) * 100);
            document.getElementById('percent-text').innerText = `${percent}%`;
            document.getElementById('count-text').innerText = `${completed} / ${totalItemsCount}`;
        }

        window.addEventListener('load', init);
    </script>
    <style>
        .chart-container { position: relative; width: 100%; height: 160px; }
        input[type="checkbox"]:checked {
            background-color: #10b981 !important;
            border-color: #10b981 !important;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e") !important;
            background-size: 100% 100% !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans antialiased min-h-screen pb-10">

<div class="max-w-xl mx-auto p-4 md:p-6">
    <header class="text-center mb-8 pt-4">
        <div class="inline-block bg-emerald-50 text-emerald-600 text-[10px] font-bold px-3 py-1 rounded-full mb-3 uppercase tracking-widest">Camping Planner</div>
        <h1 class="text-3xl font-black text-stone-900 mb-2 tracking-tight">🏔️ 우리 가족 캠핑 플래너</h1>
        <div id="user-id" class="inline-block bg-white border border-stone-200 text-stone-400 text-[10px] px-3 py-1 rounded-full shadow-sm tracking-tighter uppercase font-bold">연결 중...</div>
    </header>

    <section class="bg-white p-6 rounded-[2rem] shadow-xl shadow-stone-200/50 border border-stone-100 mb-8 relative overflow-hidden">
        <div class="flex items-center gap-6">
            <div class="chart-container flex-shrink-0 w-32 h-32">
                <canvas id="progressChart"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pt-1">
                    <span id="percent-text" class="text-3xl font-black text-stone-900 leading-none">0%</span>
                    <span id="count-text" class="text-[10px] text-stone-400 font-bold mt-1 uppercase">0 / 0</span>
                </div>
            </div>
            <div class="flex-1 text-left">
                <div class="flex items-center gap-2 mb-3">
                    <span id="status-badge" class="bg-stone-100 text-stone-400 text-[10px] px-2 py-1 rounded shadow-sm font-bold animate-pulse">오프라인</span>
                    <span class="text-stone-400 text-[10px] font-bold uppercase tracking-wider">Cloud Sync</span>
                </div>
                <h2 class="text-xl font-black mb-1 text-stone-800">패킹 진행도</h2>
                <p class="text-stone-400 text-xs">체크하면 즉시 가족 기기에 동기화됩니다.</p>
            </div>
        </div>
    </section>

    <div id="checklist-container" class="space-y-4 text-left">
        </div>

    <div class="mt-10 bg-stone-900 text-stone-400 p-8 rounded-[2rem] shadow-2xl relative overflow-hidden text-left">
        <h3 class="font-black text-white mb-6 flex items-center text-lg">
            <span class="bg-emerald-500 w-2 h-6 rounded-full mr-3"></span>
            캠프필드 이용 정보
        </h3>
        <div class="space-y-4">
            <div class="flex justify-between items-center border-b border-stone-800 pb-3 text-sm">
                <span class="font-bold uppercase tracking-widest text-stone-500 text-xs">Check-in/out</span>
                <span class="text-white">15:00 - 20:00 / 12:00</span>
            </div>
            <div class="flex justify-between items-start border-b border-stone-800 pb-3 text-sm">
                <span class="font-bold uppercase tracking-widest text-stone-500 text-xs">Bedding</span>
                <span class="text-white text-right">이너매트, 침구류 2개,<br>전기장판 1매</span>
            </div>
            <div class="bg-stone-800/50 p-4 rounded-xl mt-4">
                <p class="text-emerald-400 text-[11px] leading-relaxed font-bold">
                    💡 아기용 침구류와 여분 베개는 불포함이니 잊지 말고 꼭 챙겨주세요!
                </p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
